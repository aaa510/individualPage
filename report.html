<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>岗位匹配在线报告</title>
    <style>
      @font-face {
        font-family: "Cubic11";
        src: url("source/Cubic_11.ttf") format("truetype");
        font-display: swap;
      }

      :root {
        --ink: #3a293f;
        --line: #3a293f;
        --paper: #fffaf0;
        --pink: #ffd2e5;
        --blue: #bde8ff;
        --mint: #a8f1df;
        --yellow: #ffe38b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Cubic11", "Microsoft YaHei", sans-serif;
        background:
          linear-gradient(135deg, rgba(255, 210, 229, 0.92), rgba(189, 232, 255, 0.88) 48%, rgba(168, 241, 223, 0.9)),
          radial-gradient(circle at 14px 14px, rgba(58, 41, 63, 0.16) 2px, transparent 3px);
        background-size: auto, 28px 28px;
      }

      .report-page {
        width: min(1080px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .report-shell {
        position: relative;
        border: 4px solid var(--line);
        background: rgba(255, 250, 240, 0.94);
        box-shadow: 10px 10px 0 rgba(58, 41, 63, 0.25);
        padding: clamp(18px, 3vw, 34px);
        overflow: hidden;
      }

      .report-shell::before,
      .report-shell::after {
        content: "";
        position: absolute;
        width: 160px;
        height: 160px;
        background-image: url("img/svg/pixel-flower.svg");
        background-size: contain;
        background-repeat: no-repeat;
        opacity: 0.2;
        pointer-events: none;
      }

      .report-shell::before { right: -28px; top: -32px; }
      .report-shell::after { left: -34px; bottom: -36px; transform: rotate(18deg); }

      .report-top {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: flex-start;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 4vw, 3.2rem);
        line-height: 1.05;
      }

      .report-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        border: 3px solid var(--line);
        background: #ffffff;
        box-shadow: 4px 4px 0 rgba(58, 41, 63, 0.22);
        padding: 8px 12px;
        font-size: 0.9rem;
      }

      .back-link {
        flex: 0 0 auto;
        border: 3px solid var(--line);
        background: var(--yellow);
        color: var(--ink);
        box-shadow: 4px 4px 0 var(--line);
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 900;
      }

      #reportContent {
        position: relative;
        z-index: 1;
      }

      .styled-job-report {
        display: grid;
        gap: 18px;
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
        font-size: 1rem;
        line-height: 1.68;
      }

      .report-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 18px;
        align-items: stretch;
        border: 3px solid var(--line);
        background: linear-gradient(135deg, rgba(255, 210, 229, 0.92), rgba(189, 232, 255, 0.9));
        box-shadow: 5px 5px 0 rgba(58, 41, 63, 0.2);
        padding: 18px;
      }

      .report-kicker {
        font-family: "Cubic11", "Microsoft YaHei", sans-serif;
        margin: 0 0 8px;
        font-size: 0.84rem;
        color: #8a4b78;
        text-transform: uppercase;
      }

      .report-summary {
        margin: 0;
        line-height: 1.7;
      }

      .score-card {
        font-family: "Cubic11", "Microsoft YaHei", sans-serif;
        min-width: 150px;
        border: 3px solid var(--line);
        background: var(--yellow);
        box-shadow: 4px 4px 0 var(--line);
        padding: 14px;
        text-align: center;
        display: grid;
        align-content: center;
      }

      .score-card span,
      .score-card em {
        font-style: normal;
        font-size: 0.85rem;
      }

      .score-card strong {
        display: block;
        font-size: clamp(2.5rem, 7vw, 4.2rem);
        line-height: 1;
      }

      .report-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .report-panel {
        border: 3px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 5px 5px 0 rgba(58, 41, 63, 0.2);
        padding: 16px;
      }

      .highlight-panel {
        background: rgba(168, 241, 223, 0.55);
      }

      .risk-panel {
        background: rgba(255, 210, 229, 0.58);
      }

      .advice-panel {
        background: rgba(255, 250, 240, 0.94);
      }

      .interview-panel {
        background: rgba(189, 232, 255, 0.62);
      }

      .prep-list {
        display: grid;
        gap: 10px;
      }

      .prep-list p {
        margin: 0;
        line-height: 1.65;
      }

      .styled-job-report h2,
      .styled-job-report h3 {
        font-family: "Cubic11", "Microsoft YaHei", sans-serif;
        margin: 0 0 10px;
        line-height: 1.2;
      }

      .styled-job-report section,
      .styled-job-report .card,
      .styled-job-report > div {
        border: 3px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 5px 5px 0 rgba(58, 41, 63, 0.2);
        padding: 16px;
      }

      .styled-job-report ul,
      .styled-job-report ol {
        margin: 8px 0 0;
        padding-left: 22px;
        line-height: 1.7;
      }

      .fallback {
        white-space: pre-wrap;
        line-height: 1.8;
        border: 3px solid var(--line);
        background: #fff;
        box-shadow: 5px 5px 0 rgba(58, 41, 63, 0.2);
        padding: 16px;
      }

      @media (max-width: 720px) {
        .report-top {
          flex-direction: column;
        }

        .report-hero,
        .report-grid {
          grid-template-columns: 1fr;
        }

        .back-link {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="report-page">
      <section class="report-shell">
        <div class="report-top">
          <div>
            <h1>岗位匹配在线报告</h1>
            <div id="meta" class="report-meta"></div>
          </div>
          <a class="back-link" href="/index.html">返回首页</a>
        </div>
        <div id="reportContent">
          <div class="fallback">加载中...</div>
        </div>
      </section>
    </main>
    <script>
      const meta = document.getElementById("meta");
      const reportContent = document.getElementById("reportContent");
      const raw = sessionStorage.getItem("job_report_payload");

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;",
        })[char]);
      }

      if (!raw) {
        reportContent.innerHTML = '<div class="fallback">未找到报告数据，请返回首页重新提交。</div>';
      } else {
        try {
          const data = JSON.parse(raw);
          meta.innerHTML = `
            <span class="chip">目标职位：${escapeHtml(data.position || "")}</span>
            <span class="chip">公司名称：${escapeHtml(data.company || "")}</span>
          `;

          if (data.report_html) {
            reportContent.innerHTML = data.report_html;
          } else {
            reportContent.innerHTML = `<div class="fallback">${escapeHtml(data.report_markdown || "模型未返回报告内容。")}</div>`;
          }
        } catch (e) {
          reportContent.innerHTML = '<div class="fallback">报告数据解析失败，请返回重试。</div>';
        }
      }
    </script>
  </body>
</html>
